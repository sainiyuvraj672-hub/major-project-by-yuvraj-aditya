<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vote - FairVote</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 700px; margin: 50px auto; text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        input { display: block; width: 100%; margin: 15px 0; padding: 14px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: #00d1b2; color: white; border: none; padding: 14px 30px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; font-size: 16px; transition: 0.3s; }
        button:hover { background: #00b89c; }
        #login-camera { border: 4px solid #00d1b2; border-radius: 12px; background: #000; display: none; margin: 20px auto; }
        .hidden { display: none !important; }
        .candidate-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-logo">🗳️ FairVote</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="admin.html">Admin</a>
            <a href="index.html">Vote</a>
            <a href="results.html">Results</a>
        </div>
    </nav>
    
    <div id="login-section" class="container">
        <h1>Fair Election System</h1>
        
        <div id="id-entry">
            <input type="number" id="election-id" placeholder="Election ID" value="1">
            <input type="text" id="voter-id" placeholder="Enter Enrollment ID">
            <button onclick="startVoterAuth()">Enter Booth</button>
        </div>

        <div id="biometric-scanner" class="hidden">
            <h3 style="color: #00d1b2;">🔐 Retina Verification</h3>
            <p>Look at the camera to verify your identity.</p>
            <video id="login-camera" width="320" height="240" autoplay></video>
            <div id="scan-status" style="margin-bottom: 15px; font-weight: bold; color: #00d1b2;">[ System Ready ]</div>
            <button onclick="verifyVoterIdentity()" style="background: #2ecc71;">Confirm Identity</button>
        </div>
    </div>

    <div id="voting-section" class="container hidden">
        <h2 id="welcome-msg" style="color: #333;">Welcome</h2>
        <h3 id="election-title" style="color: #00d1b2;"></h3>
        <div id="candidate-list" style="margin-top: 20px;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
